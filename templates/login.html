{% extends "base.html" %}
{% block title %}Admin Login - VeggieTech{% endblock %}

{% block content %}
<section>
  <h2>Admin Login</h2>
  <p>Enter your administrator credentials to access the management panel.</p>

  <form action="{{ url_for('login') }}" method="POST" id="login-form">
    <p>
      <label for="username">Username:</label><br>
      <input type="text" id="username" name="username"
             placeholder="Enter username" required autocomplete="off">
    </p>
    <p>
      <label for="password">Password:</label><br>
      <div style="position: relative;">
        <input type="password" id="password" name="password"
               placeholder="Enter password" required style="padding-right: 40px;">
        <span id="password-toggle" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #666; display: flex; align-items: center;">
          <svg id="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 20px; height: 20px;">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        </span>
      </div>
    </p>
    <p>
      <input type="submit" value="Login" id="login-btn">
    </p>
  </form>
</section>
{% endblock %}

{% block scripts %}
<script>
  const passInput = document.getElementById('password');
  const toggleBtn = document.getElementById('password-toggle');
  const eyeIcon   = document.getElementById('eye-icon');

  if (toggleBtn && passInput) {
    toggleBtn.addEventListener('click', function() {
      if (passInput.type === 'password') {
        passInput.type = 'text';
        eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
      } else {
        passInput.type = 'password';
        eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
      }
    });
  }
</script>
{% endblock %}
